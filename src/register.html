<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registration Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Register</h1>
    <form id="registerForm" novalidate>
      <fieldset>
        <legend>Personal Details</legend>
        <div class="row">
          <label for="firstName">First name</label>
          <input id="firstName" name="firstName" type="text" required maxlength="60">
        </div>
        <div class="row">
          <label for="lastName">Last name</label>
          <input id="lastName" name="lastName" type="text" required maxlength="60">
        </div>
        <div class="row">
          <label for="dob">Date of birth</label>
          <input id="dob" name="dob" type="date">
        </div>
        <div class="row">
          <label for="gender">Gender</label>
          <select id="gender" name="gender">
            <option value="">Prefer not to say</option>
            <option>Female</option>
            <option>Male</option>
            <option>Non-binary</option>
            <option>Other</option>
          </select>
        </div>
      </fieldset>

      <fieldset>
        <legend>Account</legend>
        <div class="row">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required minlength="3" maxlength="30">
        </div>
        <div class="row">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required minlength="8">
        </div>
        <div class="row">
          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" required minlength="8">
        </div>
        <div class="row">
          <label for="avatar">Profile picture</label>
          <input id="avatar" name="avatar" type="file" accept="image/*">
        </div>
      </fieldset>

      <fieldset>
        <legend>Contact</legend>
        <div class="row">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required>
        </div>
        <div class="row">
          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" placeholder="+1-555-555-5555">
        </div>
        <div class="row">
          <label for="altPhone">Alternate phone</label>
          <input id="altPhone" name="altPhone" type="tel">
        </div>
      </fieldset>

      <fieldset>
        <legend>Location</legend>
        <div class="row">
          <label for="street">Street address</label>
          <input id="street" name="street" type="text">
        </div>
        <div class="row">
          <label for="city">City</label>
          <input id="city" name="city" type="text">
        </div>
        <div class="row">
          <label for="state">State / Region</label>
          <input id="state" name="state" type="text">
        </div>
        <div class="row">
          <label for="postal">Postal code</label>
          <input id="postal" name="postal" type="text" inputmode="numeric">
        </div>
        <div class="row">
          <label for="country">Country</label>
          <select id="country" name="country">
            <option value="">Select country</option>
            <option>United States</option>
            <option>Canada</option>
            <option>United Kingdom</option>
            <option>Australia</option>
            <option>Other</option>
          </select>
        </div>
        <div class="row small">
          <button type="button" id="detectLocation">Detect my location</button>
          <div id="locationStatus" aria-live="polite"></div>
        </div>
      </fieldset>

      <div class="row checkbox">
        <label>
          <input id="newsletter" name="newsletter" type="checkbox">
          Subscribe to newsletter
        </label>
      </div>

      <div class="row checkbox">
        <label>
          <input id="terms" name="terms" type="checkbox" required>
          I agree to the <a href="#">terms and conditions</a>
        </label>
      </div>

      <div class="row actions">
        <button type="submit">Create account</button>
        <button type="reset" class="secondary">Reset</button>
      </div>

      <div id="formMessages" aria-live="polite"></div>
    </form>
  </main>
  <script src="app.js"></script>
</body>
</html>
